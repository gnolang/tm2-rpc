name: E2E Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    services:
      gno:
        image: ghcr.io/gnolang/gno/gnodev:latest
        options: --name gno --entrypoint '/usr/bin/gnodev local --add-account g1ldng3lt5mdmt92w2xphmjqu2r0pespsyfge66x=100000000000ugnot'
        ports:
          - 8888:8888
          - 26657:26657
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 20.x
        check-latest: true

    - name: Install dependencies
      run: npm install -g pnpm && pnpm install
    - name: Build the project
      run: pnpm build
    - name: Run tests
      run: pnpm test